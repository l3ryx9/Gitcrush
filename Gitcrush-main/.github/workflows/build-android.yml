name: Build Android APK

# Build 100% local (GitHub Actions + Gradle), sans passer par le service
# cloud EAS Build — utile pour éviter les files d'attente / quotas EAS et
# garder un contrôle total sur l'environnement de build.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type de build"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout du code
        uses: actions/checkout@v4

      # ── 2. Node.js (aligné sur eas.json : 22.x) ──────────────────────────
      - name: Configuration Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Dépendances npm (via le package-lock.json du dépôt) ───────────
      - name: Installation des dépendances
        run: npm ci --legacy-peer-deps
        env:
          npm_config_fund: false
          npm_config_audit: false

      # ── 4. JDK 17 (requis par Gradle / Android) ──────────────────────────
      - name: Configuration JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Cache Gradle (accélère les builds suivants) ───────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Génération du projet natif Android ────────────────────────────
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          CI: true

      # ── 7. Décodage du keystore de signature (si secret fourni) ──────────
      - name: Décodage du keystore release
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "✅ Keystore release décodé"
          else
            echo "⚠️  ANDROID_KEYSTORE_BASE64 non défini — l'APK sera signé en debug"
          fi

      # ── 8. Câblage réel de la signature release dans build.gradle ───────
      - name: Configuration de la signature release
        run: node ci/sign-android.js

      # ── 9. Licences Android SDK (SDK pré-installé sur le runner) ─────────
      - name: Acceptation des licences SDK
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # ── 10. Build Gradle ──────────────────────────────────────────────────
      - name: Build de l'APK
        run: |
          cd android
          chmod +x gradlew
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ── 11. Upload de l'APK généré ────────────────────────────────────────
      - name: Upload de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: gitcrush-${{ env.BUILD_TYPE }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
